<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>&#20303;&#25152;&#12434;&#30331;&#37682; &mdash; Yamabiko</title>
<script src="https://static.line-scdn.net/liffjs/2.22.3/sdk.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#f5f5f5;padding:20px}
h1{font-size:20px;margin-bottom:4px;color:#111}
.sub{font-size:13px;color:#666;margin-bottom:24px}
.card{background:#fff;border-radius:12px;padding:20px}
.field{margin-bottom:16px}
label{display:block;font-size:13px;font-weight:600;color:#444;margin-bottom:6px}
input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:15px}
input:focus{outline:none;border-color:#06c755}
.req{color:#e00;margin-left:4px}
.btn{display:block;width:100%;padding:14px;background:#06c755;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;margin-top:24px}
.btn:disabled{background:#aaa;cursor:not-allowed}
.note{font-size:12px;color:#888;margin-top:16px;line-height:1.6}
.err{color:#e00;font-size:13px;margin-top:8px}
.ok{text-align:center;padding:40px 20px}
.ok h2{color:#06c755;margin-bottom:12px}
</style>
</head>
<body>
<h1>&#20303;&#25152;&#12434;&#30331;&#37682;</h1>
<p class="sub">&#26412;&#12398;&#21463;&#12369;&#21462;&#12426;&#20808;&#12434;&#25945;&#12360;&#12390;&#12367;&#12384;&#12373;&#12356;&#12290;<br>&#20303;&#25152;&#12399;&#26263;&#21495;&#21270;&#12375;&#12390;&#31649;&#29702;&#12375;&#12289;&#30456;&#25163;&#12395;&#12399;&#19968;&#20999;&#38283;&#31034;&#12373;&#12428;&#12414;&#12379;&#12435;&#12290;</p>
<div id="form-area" class="card">
  <div class="field"><label>&#27663;&#21517;<span class="req">*</span></label><input type="text" id="name" placeholder="&#23665;&#30000; &#22826;&#37070;" autocomplete="name"></div>
  <div class="field"><label>&#38651;&#35441;&#30058;&#21495;</label><input type="tel" id="phone" placeholder="090-0000-0000" autocomplete="tel"></div>
  <div class="field"><label>&#37109;&#20415;&#30058;&#21495;<span class="req">*</span></label><input type="text" id="postal" placeholder="000-0000" maxlength="8" autocomplete="postal-code" oninput="onPostal(this.value)"></div>
  <div class="field"><label>&#37117;&#36947;&#24220;&#30476;<span class="req">*</span></label><input type="text" id="pref" placeholder="&#26481;&#20140;&#37117;" autocomplete="address-level1"></div>
  <div class="field"><label>&#24066;&#21306;&#30010;&#26449;<span class="req">*</span></label><input type="text" id="city" placeholder="&#28171;&#35895;&#21306;&#28171;&#35895;" autocomplete="address-level2"></div>
  <div class="field"><label>&#30058;&#22320;<span class="req">*</span></label><input type="text" id="street" placeholder="1-2-3"></div>
  <div class="field"><label>&#24314;&#29289;&#21517;&#12539;&#37096;&#23627;&#30058;&#21495;</label><input type="text" id="building" placeholder="&#9675;&#9675;&#12510;&#12531;&#12471;&#12519;&#12531; 101&#21495;&#23460;"></div>
  <div id="err" class="err"></div>
  <button class="btn" id="btn" onclick="doSubmit()">&#30331;&#37682;&#12377;&#12427;</button>
  <p class="note">&#8251; &#20303;&#25152;&#12399;AES-256&#12391;&#26263;&#21495;&#21270;&#12375;&#12390;&#20445;&#31649;&#12375;&#12414;&#12377;&#12290;&#36865;&#12426;&#20027;&#12539;&#21463;&#12369;&#25163;&#12398;&#21452;&#26041;&#12395;&#20303;&#25152;&#12399;&#38283;&#31034;&#12373;&#12428;&#12414;&#12379;&#12435;&#12290;</p>
</div>
<div id="ok" class="ok" style="display:none"><h2>&#10003; &#30331;&#37682;&#23436;&#20102;</h2><p>&#20303;&#25152;&#12434;&#30331;&#37682;&#12375;&#12414;&#12375;&#12383;&#12290;<br>LINE&#12395;&#25147;&#12387;&#12390;&#27425;&#12398;&#25163;&#38918;&#12408;&#36914;&#12435;&#12391;&#12367;&#12384;&#12373;&#12356;&#12290;</p></div>
<script>
var uid=null;
(async()=>{
  if(typeof liff==='undefined'){try{var m=await import('https://esm.sh/@line/liff@2.22.3');window.liff=m.default||m;}catch(e){return;}}
  try{
    await liff.init({liffId:'2010533139-b0B55CJC'});
    if(!liff.isLoggedIn()){liff.login();return;}
    var p=await liff.getProfile();
    uid=p.userId;
  }catch(e){console.error(e);}
})();
async function onPostal(v){
  var z=v.replace(/[^d]/g,'');
  if(z.length!==7)return;
  try{
    var r=await fetch('https://zipcloud.ibsnet.co.jp/api/search?zipcode='+z);
    var d=await r.json();
    if(d.results&&d.results[0]){
      var a=d.results[0];
      document.getElementById('pref').value=a.address1;
      document.getElementById('city').value=a.address2+a.address3;
      document.getElementById('street').focus();
    }
  }catch(e){}
}
async function doSubmit(){
  var btn=document.getElementById('btn');
  var err=document.getElementById('err');
  err.textContent='';
  var name=document.getElementById('name').value.trim();
  var phone=document.getElementById('phone').value.trim();
  var postal=document.getElementById('postal').value.trim();
  var pref=document.getElementById('pref').value.trim();
  var city=document.getElementById('city').value.trim();
  var street=document.getElementById('street').value.trim();
  var building=document.getElementById('building').value.trim();
  if(!name||!postal||!pref||!city||!street){err.textContent='\u5fc5\u9808\u9805\u76ee\u3092\u5165\u529b\u3057\u3066\u304f\u3060\u3055\u3044\u3002';return;}
  if(!uid){err.textContent='LINE\u30ed\u30b0\u30a4\u30f3\u304c\u5fc5\u8981\u3067\u3059\u3002\u30da\u30fc\u30b8\u3092\u518d\u8aad\u307f\u8fbc\u307f\u3057\u3066\u304f\u3060\u3055\u3044\u3002';return;}
  btn.disabled=true;btn.textContent='\u9001\u4fe1\u4e2d...';
  try{
    var r=await fetch('https://apaaevulcddwtyvkurlx.supabase.co/functions/v1/line-bot/liff',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'address_submitted',line_user_id:uid,display_name:name,phone:phone||null,
        address:{postal_code:postal,prefecture:pref,city:city,street:street,building:building||null}})
    });
    if(!r.ok)throw new Error(await r.text());
    document.getElementById('form-area').style.display='none';
    document.getElementById('ok').style.display='block';
    setTimeout(()=>liff.closeWindow(),3000);
  }catch(e){
    err.textContent='\u9001\u4fe1\u306b\u5931\u6557\u3057\u307e\u3057\u305f\u3002\u3082\u3046\u4e00\u5ea6\u304a\u8a66\u3057\u304f\u3060\u3055\u3044\u3002';
    btn.disabled=false;btn.textContent='\u767b\u9332\u3059\u308b';
  }
}
</script>
</body>
</html>
